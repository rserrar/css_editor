
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemple Web Real (Preview)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; line-height: 1.5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #eee; padding: 2rem; border-radius: 1rem; }
        h1 { margin-top: 0; }
        .card { background: #f9fafb; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 0.25rem; }
        button { background: #000; color: #fff; border: none; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; }
        .help { color: #666; font-size: 0.875rem; margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-editable="home.title">Benvinguts a la Preview</h1>
        
        <div class="card">
            <h2 data-editable="home.subtitle">Panell de subscripció</h2>
            <p>Aquest és un exemple d'una web que té elements editables.</p>
            
            <div style="margin-bottom: 1rem;">
                <label data-editable="form.label">El teu correu</label>
                <input type="email" placeholder="correu@exemple.com">
            </div>
            
            <button data-editable="form.button">Subscriu-me ara</button>
        </div>

        <div class="help">
            <p><strong>Com provar-ho:</strong> Afegeix <code>?session=123</code> a la URL de la web i obre l'editor amb el mateix ID.</p>
        </div>
    </div>

    <!-- INTEGRACIÓ DEL MÒDUL -->
    <script src="preview-module.js"></script>
</body>
</html>
